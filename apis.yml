features:
  - name: Payment Gateway
    description: >-
      Accept payments via cards, UPI, netbanking, wallets, EMI, and pay-later
      methods through a hosted Checkout, Standard SDK, or Custom integration.
  - name: Payment Links and Pages
    description: >-
      Create shareable payment links and no-code hosted pages for collecting
      payments without a website or app.
  - name: Subscriptions
    description: >-
      Recurring billing with plans, add-ons, and automated retries supporting
      cards, UPI Autopay, and e-mandate.
  - name: RazorpayX Payouts
    description: >-
      Business banking API for outgoing payments via IMPS, NEFT, RTGS, UPI,
      and card to bank, vendor, and employee payouts.
  - name: Smart Collect
    description: >-
      Virtual accounts and UPI IDs for receiving and reconciling B2B
      bank-transfer collections automatically.
  - name: Webhooks
    description: >-
      Subscribe to events such as payment.captured, order.paid, refund.processed,
      and subscription.charged for real-time event-driven integrations.
solutions:
  - name: E-commerce Checkout
    description: >-
      Drop-in Checkout integration accepting all popular Indian payment
      methods with optimized conversion and one-tap UPI flows.
  - name: SaaS Subscriptions
    description: >-
      Recurring billing for Indian and international subscribers with UPI
      Autopay, e-mandate, and international cards.
  - name: Marketplace Payments
    description: >-
      Route, split, and settle funds across linked accounts using Razorpay
      Route for marketplaces and platforms.
useCases:
  - name: Accepting Online Payments
    description: >-
      Add card, UPI, netbanking, wallet, and EMI acceptance to a website
      or mobile app with a single integration.
  - name: Recurring Billing
    description: >-
      Charge customers on a recurring cadence using saved cards or UPI
      Autopay mandates with automatic retries on failure.
  - name: Vendor and Payroll Payouts
    description: >-
      Send instant IMPS/UPI payouts to vendors, freelancers, and employees
      via the RazorpayX business banking API.
integrations:
  - name: Shopify
    description: Razorpay payments app for Shopify checkout in India
  - name: WooCommerce
    description: Official WooCommerce plugin for Razorpay payments
  - name: Magento
    description: Magento 1 and 2 extensions for Razorpay
  - name: Zoho
    description: Razorpay integrations across Zoho Books, Invoice, and Subscriptions
  - name: Tally
    description: Reconcile Razorpay settlements into Tally accounting
